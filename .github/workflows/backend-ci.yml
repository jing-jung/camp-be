name: backend-ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests and IaC validation
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Scan prohibited terms
        run: python scripts/check_prohibited_terms.py

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false

      - name: Terraform format check
        run: terraform fmt -check -recursive
        working-directory: infra/terraform

      - name: Terraform init
        run: terraform init -backend=false -input=false
        working-directory: infra/terraform

      - name: Terraform validate
        run: terraform validate -no-color
        working-directory: infra/terraform

  codeql:
    name: CodeQL code scanning
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          build-mode: none

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"

  security:
    name: Filesystem security scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          scanners: vuln,secret,config
          severity: HIGH,CRITICAL

  package-deploy:
    name: Package deployment artifact
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [test, codeql, security]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Build Lambda package
        run: ./scripts/package_api_lambda.sh

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@v7
        with:
          name: stockbrief-api-lambda-${{ github.sha }}
          path: dist/stockbrief-api-lambda.zip
          if-no-files-found: error
          retention-days: 14
