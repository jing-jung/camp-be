services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: stockbrief
      POSTGRES_PASSWORD: stockbrief
      POSTGRES_DB: stockbrief
    ports:
      - "5432:5432"
    volumes:
      - stockbrief_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockbrief -d stockbrief"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  stockbrief_postgres_data:
